version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: sea-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: desafio_sea_db
    ports:
      - "5432:5432"
    volumes:
      - sea_db_data:/var/lib/postgresql/data

volumes:
  sea_db_data: